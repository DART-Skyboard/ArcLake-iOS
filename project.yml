name: ArcLake
options:
  bundleIdPrefix: com.dartmeadow
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  xcodeVersion: "15.4"
  xcodeCompatibilityVersion: "Xcode 14.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  ArcLakeApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/ArcLakeApp
      - Sources/ArcLakeApp/ArcLakeData.xcdatamodeld
      - Sources/ArcLakeApp/Resources
    info:
      path: Sources/ArcLakeApp/Info.plist
      properties:
        CFBundleDisplayName: Arc Lake
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        NSCameraUsageDescription: Used for AR mode atom visualization
        NSPhotoLibraryAddUsageDescription: Save GLB exports and screenshots
        NSMicrophoneUsageDescription: Voice commands for the ArcLake lab assistant
        NSSpeechRecognitionUsageDescription: Autumn uses speech recognition to understand your voice commands for the ArcLake molecular lab
    entitlements:
      path: Sources/ArcLakeApp/ArcLakeApp.entitlements
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
        embed: false
        link: true
      - sdk: ARKit.framework
      - sdk: RealityKit.framework
      - sdk: ModelIO.framework
    settings:
      base:
        PRODUCT_NAME: "Arc Lake"
        PRODUCT_BUNDLE_IDENTIFIER: DART-Meadow-LLC.Cotharticren
        DEVELOPMENT_TEAM: L7AHWS9Q6V
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE: "4f27288c-6ada-4a8b-b93a-b42dec94a720"
        PROVISIONING_PROFILE_SPECIFIER: "ArcLakeGitHubFlow"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Sources/ArcLakeApp/ArcLakeApp.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: "191"
        MARKETING_VERSION: "1.5.0"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
schemes:
  ArcLakeApp:
    build:
      targets:
        ArcLakeApp: all
    archive:
      config: Release
