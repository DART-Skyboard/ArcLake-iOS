name: Build & Deploy ArcLake to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build ArcLake iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8

      - name: Setup keychain, install certificate and provisioning profile
        env:
          CERTIFICATE_BASE64:          ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PP_PATH="$RUNNER_TEMP/arclake.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || echo "4f27288c-6ada-4a8b-b93a-b42dec94a720")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Profile UUID: $PP_UUID"

      - name: Install xcodegen 2.42.0
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ArcLake.xcodeproj -scheme ArcLakeApp

      - name: Archive
        run: |
          PP_FINAL="${PROFILE_UUID:-4f27288c-6ada-4a8b-b93a-b42dec94a720}"
          /usr/local/bin/xcodegen generate || echo "xcodegen already ran"
          xcodebuild archive \
            -project ArcLake.xcodeproj \
            -scheme ArcLakeApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ArcLake.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_FINAL" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"
          ls -la "$RUNNER_TEMP/ArcLake.xcarchive"

      - name: Export IPA
        run: |
          # Package IPA directly from archive (Xcode 26 exportArchive method change)
          ARCHIVE="$RUNNER_TEMP/ArcLake.xcarchive"
          APP=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr "ArcLake.ipa" Payload/
          ls -la "$RUNNER_TEMP/ArcLake.ipa"

      - name: Upload to TestFlight
        run: |
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ArcLake.ipa" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "90056871-d791-45f6-a770-21399c45e491" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 2>&1)
          echo "$RESULT"
          # Fail only on actual upload failure (not "No errors" false positive)
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|State_Error|Validation failed|^.*ERROR:" | grep -v "No errors"; then
            echo "Upload failed — see above"; exit 1
          fi
          echo "✓ Upload accepted"

  build-dart:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout DART-iOS
        uses: actions/checkout@v4
        with:
          repository: DART-Skyboard/DART-iOS
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install ASC key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_CONTENT }}" > ~/private_keys/AuthKey_NQXQ595W59.p8

      - name: Install cert + DART profile
        env:
          CERTIFICATE_BASE64:   ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          DART_PROFILE_BASE64:  ${{ secrets.DART_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "ci" dart.keychain
          security default-keychain -s dart.keychain
          security unlock-keychain -p "ci" dart.keychain
          security set-keychain-settings -lut 21600 dart.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k dart.keychain -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" dart.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$DART_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/DARTGitHubFlow.mobileprovision

      - name: Install xcodegen + Generate + Archive
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip -o xcodegen.zip
          unzip -q xcodegen.zip
          # The zip extracts to a directory named 'xcodegen' containing the binary
          sudo cp xcodegen/bin/xcodegen /usr/local/bin/xcodegen || sudo cp xcodegen/xcodegen /usr/local/bin/xcodegen || true
          ls xcodegen/
          which xcodegen || ls /usr/local/bin/xcodegen
          xcodegen generate
          xcodebuild archive \
            -scheme DARTApp -configuration Release \
            -archivePath $RUNNER_TEMP/DART.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            PROVISIONING_PROFILE_SPECIFIER=DARTGitHubFlow | xcpretty

      - name: Export IPA
        run: |
          APP=$(find $RUNNER_TEMP/DART.xcarchive/Products -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -qr DART.ipa Payload/

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file $RUNNER_TEMP/DART.ipa \
            --apiKey NQXQ595W59 \
            --apiIssuer 90056871-d791-45f6-a770-21399c45e491 \
            --show-progress
