name: Build & Deploy DART to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build DART iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout DART-iOS repository
        uses: actions/checkout@v4
        with:
          repository: DART-Skyboard/DART-iOS
          token: ${{ secrets.GH_PAT }}

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8

      - name: Setup keychain, install certificate and provisioning profile
        env:
          CERTIFICATE_BASE64:          ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List workspace
        run: find . -name "*.xcodeproj" | head -5

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DART.xcodeproj \
            -scheme DARTApp \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8" \
            -authenticationKeyID NQXQ595W59 \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project DART.xcodeproj \
            -scheme DARTApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/DART.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8" \
            -authenticationKeyID "NQXQ595W59" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"
          ls -la "$RUNNER_TEMP/DART.xcarchive" || (echo "Archive missing" && exit 1)

      - name: Export IPA
        run: |
          # Direct zip method (Xcode 26 compatible, same as ArcLake pipeline)
          ARCHIVE="$RUNNER_TEMP/DART.xcarchive"
          APP=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr "DART.ipa" Payload/
          mkdir -p "$RUNNER_TEMP/export"
          cp "$RUNNER_TEMP/DART.ipa" "$RUNNER_TEMP/export/DART.ipa"
          ls -la "$RUNNER_TEMP/export/"

      - name: Upload to TestFlight
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          echo "Uploading: $IPA"
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|State_Error|Validation failed" | grep -v "No errors"; then
            echo "Upload failed — see above"; exit 1
          fi
          echo "✓ DART upload accepted"
