name: Build Ash Tree IDE for TestFlight

on:
  workflow_dispatch:

jobs:
  build-ashtreeide:
    name: Build Ash Tree IDE
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout AshtreeIDE-iOS
        uses: actions/checkout@v4
        with:
          repository: DART-Skyboard/AshtreeIDE-iOS
          token: ${{ secrets.GH_PAT }}

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Install ASC API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys ~/private_keys ~/.private_keys
          printf '%s' "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 ~/private_keys/
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          echo "Key: $(wc -c < ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8) bytes"

      - name: Install cert + Ash Tree profile
        env:
          CERTIFICATE_BASE64:     ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:      ${{ secrets.KEYCHAIN_PASSWORD }}
          ASHTREE_PROFILE_BASE64: ${{ secrets.ASHTREE_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ashtree-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$ASHTREE_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/ashtree.mobileprovision"
          cp "$RUNNER_TEMP/ashtree.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/3d6f3884-df17-4871-afc1-e1edcedc7335.mobileprovision
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install xcodegen 2.42.0
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip \
            -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen_bin
          sudo cp /tmp/xcodegen_bin/xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Bump build number
        run: |
          BUILD=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" \
            Sources/AshtreeIDEApp/Info.plist
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV

      - name: Archive
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          xcodebuild archive \
            -project AshtreeIDE-iOS.xcodeproj \
            -scheme AshtreeIDE-iOS \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AshtreeIDE.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="3d6f3884-df17-4871-afc1-e1edcedc7335" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/ashtree-signing.keychain-db" \
            2>&1 | tail -20
          echo "Binary: $(find $RUNNER_TEMP/AshtreeIDE.xcarchive -name "Ash Tree IDE" -type f)"

      - name: Write ExportOptions and export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>L7AHWS9Q6V</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>DART-Meadow-LLC.AshtreeIDE</key><string>AshtreeIDEAppStore</string>
            </dict>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AshtreeIDE.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            2>&1 | tail -10

          # Rename IPA to remove spaces
          find "$RUNNER_TEMP/export" -name "*.ipa" -exec mv {} "$RUNNER_TEMP/export/AshtreeIDE.ipa" \;
          ls -la "$RUNNER_TEMP/export/"
          echo "IPA_PATH=$RUNNER_TEMP/export/AshtreeIDE.ipa" >> $GITHUB_ENV
          echo "IPA size: $(du -sh $RUNNER_TEMP/export/AshtreeIDE.ipa)"

      - name: Upload to TestFlight
        run: |
          echo "Uploading: $IPA_PATH"
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|State_Error|Validation failed" | grep -v "No errors"; then
            exit 1
          fi
          echo "✓ Ash Tree IDE build ${{ env.BUILD_NUMBER }} uploaded to TestFlight"
